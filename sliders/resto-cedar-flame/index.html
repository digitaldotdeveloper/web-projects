<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cedar Flame — Lebanese Kitchen</title>
<style>
  :root{
    --serif:"Playfair Display","Cormorant Garamond",Georgia,"Times New Roman",serif;
    --sans:"Poppins","Segoe UI",system-ui,-apple-system,sans-serif;
    --gold:#c9a24a;
    --cream:#efe7d8;
    --ink:#1b1a17;
    --linen:#d9d0c2;
    --ease:cubic-bezier(.16,.84,.32,1);
    --ease-in:cubic-bezier(.7,0,.84,0);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--sans);overflow:hidden;background:transparent;color:var(--ink);}
  img{display:block;max-width:100%;pointer-events:none;-webkit-user-drag:none;}

  .stage{position:relative;width:100vw;height:100vh;overflow:hidden;user-select:none;}

  /* ===== background: warm linen right, dark slate diagonal left (from reference) ===== */
  .bg-light{position:absolute;inset:0;
    background:
      linear-gradient(135deg,#e4dccd 0%,#d6ccbb 55%,#cabfac 100%),
      radial-gradient(120% 100% at 90% 20%,#e9e2d4,#cfc4b2);
    background-blend-mode:multiply;}
  .bg-light::after{content:"";position:absolute;inset:0;opacity:.5;
    background:repeating-linear-gradient(115deg,rgba(0,0,0,.015) 0 2px,transparent 2px 5px);}
  /* left side = wooden table */
  .bg-dark{position:absolute;inset:0;z-index:1;
    background:#1b140d url(./wood.webp) center/cover;
    clip-path:polygon(0 0, 58% 0, 47% 100%, 0 100%);}
  .bg-dark::after{content:"";position:absolute;inset:0;
    background:
      radial-gradient(95% 95% at 38% 42%,transparent 28%,rgba(0,0,0,.5) 100%),
      linear-gradient(120deg,rgba(0,0,0,.25),transparent 45%);}
  .bg-wedge{position:absolute;inset:0;z-index:1;
    background:radial-gradient(80% 80% at 50% 100%,#1a1814,#0f0e0b);
    clip-path:polygon(40% 100%, 62% 45%, 74% 100%);opacity:.96;}
  .grain{position:absolute;inset:0;z-index:14;pointer-events:none;mix-blend-mode:overlay;opacity:.5;
    background:radial-gradient(140% 100% at 50% 50%,transparent 55%,rgba(0,0,0,.45) 100%);}

  /* ===== header ===== */
  header{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:30px 46px;}
  .logo{display:flex;align-items:center;gap:14px;color:var(--gold);}
  .logo svg{width:44px;height:52px;}
  .logo .lt{font-family:var(--serif);font-weight:800;font-size:26px;letter-spacing:5px;color:#e7dcc4;line-height:1;}
  .logo .ls{font-size:9.5px;letter-spacing:4px;color:var(--gold);margin-top:5px;}
  .menu{display:flex;flex-direction:column;gap:6px;cursor:pointer;padding:8px;}
  .menu span{width:30px;height:2px;background:var(--ink);display:block;transition:.3s;}

  /* ===== food scene (left) ===== */
  .scene{position:absolute;inset:0;z-index:6;}
  /* each layer is positioned by its CENTRE point (top/left), parallax added on top */
  .layer{position:absolute;will-change:transform;
    transform:translate(-50%,-50%) translate3d(var(--px,0px),var(--py,0px),0);}
  .layer .inner{will-change:transform,opacity;transform:rotate(var(--rot,0deg)) scale(var(--scl,1));}
  .layer .art{will-change:transform;}

  .l-platter  {top:50%;left:40%;width:min(600px,36vw);z-index:6;}
  .l-hummus   {top:24%;left:13%;width:min(280px,17vw);z-index:8;}
  .l-tabbouleh{top:57%;left:10%;width:min(340px,20vw);z-index:5;}
  .l-pita     {top:86%;left:13%;width:min(430px,26vw);z-index:9;}
  .l-chick    {top:36%;left:6%; width:min(95px,5.4vw);z-index:9;}

  .l-platter .art{filter:drop-shadow(0 46px 50px rgba(0,0,0,.6));}
  .l-hummus .art,.l-tabbouleh .art{filter:drop-shadow(0 30px 34px rgba(0,0,0,.55));}
  .l-pita .art{filter:drop-shadow(0 26px 30px rgba(0,0,0,.5));}
  .l-chick .art{filter:drop-shadow(0 12px 14px rgba(0,0,0,.5));}

  /* ===== ambient motion ===== */
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @keyframes floatY2{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  .l-platter .art{animation:spin 120s linear infinite;}
  .l-hummus .art{animation:floatY 6.5s ease-in-out infinite;}
  .l-tabbouleh .art{animation:floatY2 7.5s ease-in-out infinite .4s;}
  .l-pita .art{animation:floatY 8s ease-in-out infinite .8s;}
  .l-chick .art{animation:sway 5s ease-in-out infinite;}

  /* ===== content (right) ===== */
  .content{position:absolute;top:50%;right:5.5%;width:min(560px,42vw);z-index:12;
    transform:translateY(-50%) translate3d(var(--cpx,0px),0,0);}
  .eyebrow{overflow:hidden;}
  .eyebrow span{display:block;font-size:14px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:18px;font-weight:500;}
  .title{font-family:var(--serif);font-weight:800;color:var(--ink);line-height:.98;overflow:hidden;}
  .title span{display:block;font-size:clamp(48px,6vw,92px);white-space:nowrap;}
  .divider{display:flex;align-items:center;gap:14px;margin:26px 0;width:230px;transform-origin:left;}
  .divider .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent);}
  .divider .ln:first-child{background:linear-gradient(90deg,transparent,var(--gold));}
  .divider svg{width:20px;height:20px;color:var(--gold);flex:none;}
  .desc{font-size:18px;line-height:1.7;color:#4a463d;max-width:440px;}
  .btn{display:inline-block;margin-top:34px;padding:19px 40px;background:var(--ink);color:var(--cream);
    letter-spacing:3px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;position:relative;overflow:hidden;}
  .btn span{position:relative;z-index:1;transition:color .35s;}
  .btn::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateY(101%);transition:transform .35s var(--ease);}
  .btn:hover::before{transform:translateY(0);}
  .btn:hover span{color:var(--ink);}

  /* ===== footer / nav ===== */
  .nav{position:absolute;right:5.5%;bottom:52px;z-index:20;display:flex;align-items:center;gap:30px;}
  .nav button{background:none;border:none;cursor:pointer;color:var(--ink);letter-spacing:3px;font-weight:600;font-size:14px;font-family:var(--sans);transition:color .2s;}
  .nav button:hover{color:var(--gold);}
  .pager{position:absolute;left:50%;transform:translateX(-50%);bottom:52px;z-index:20;display:flex;gap:12px;align-items:center;}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(120,110,90,.35);cursor:pointer;overflow:hidden;position:relative;transition:transform .3s;}
  .dot.on{background:rgba(201,162,74,.3);transform:scale(1.15);}
  .dot i{position:absolute;inset:0;border-radius:50%;background:var(--gold);transform:scale(0);transform-origin:center;}
  .dot.on i{animation:dotfill 6s linear forwards;}
  @keyframes dotfill{from{transform:scale(0)}to{transform:scale(1)}}

  .progress{position:absolute;left:0;top:0;height:3px;width:100%;z-index:25;background:transparent;}
  .progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),#e6c878);}
  .progress.run i{animation:fill 6s linear forwards;}
  @keyframes fill{from{width:0}to{width:100%}}

  /* =================== TRANSITIONS =================== */
  @keyframes maskUp   {from{transform:translateY(115%)}to{transform:translateY(0)}}
  @keyframes maskDown {from{transform:translateY(0)}to{transform:translateY(-115%)}}
  @keyframes cIn {from{opacity:0;transform:translateX(calc(var(--dir,1)*60px))}to{opacity:1;transform:translateX(0)}}
  @keyframes cOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(calc(var(--dir,1)*-46px))}}
  @keyframes divIn{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}

  /* platter: spin + scale in */
  @keyframes platterIn{from{opacity:0;transform:rotate(calc(var(--rot,0deg) - 55deg)) scale(.5)}
                       to  {opacity:1;transform:rotate(var(--rot,0deg)) scale(var(--scl,1))}}
  @keyframes platterOut{from{opacity:1;transform:rotate(var(--rot,0deg)) scale(var(--scl,1))}
                        to  {opacity:0;transform:rotate(calc(var(--rot,0deg) + 35deg)) scale(.55)}}
  /* hummus: drops from above with a tilt + bounce */
  @keyframes dropIn {from{opacity:0;transform:translateY(-160px) rotate(-16deg) scale(.82)}
                     to  {opacity:1;transform:translateY(0) rotate(0) scale(var(--scl,1))}}
  /* tabbouleh: rolls in from the left */
  @keyframes leftIn {from{opacity:0;transform:translateX(-200px) rotate(-32deg) scale(.9)}
                     to  {opacity:1;transform:translateX(0) rotate(0) scale(var(--scl,1))}}
  /* pita: tumbles up from the bottom */
  @keyframes riseIn {from{opacity:0;transform:translateY(190px) rotate(24deg) scale(.88)}
                     to  {opacity:1;transform:translateY(0) rotate(0) scale(var(--scl,1))}}
  /* chickpeas: scatter-pop with a spin */
  @keyframes popIn  {from{opacity:0;transform:scale(0) rotate(-150deg)}
                     to  {opacity:1;transform:scale(var(--scl,1)) rotate(0)}}
  @keyframes foodOut{from{opacity:1}to{opacity:0;transform:scale(.8) rotate(var(--rot,0deg))}}

  /* backgrounds each get their OWN transition */
  @keyframes woodIn {from{opacity:0;transform:translateX(-16%)}to{opacity:1;transform:translateX(0)}}
  @keyframes woodOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-11%)}}
  @keyframes linenIn {from{opacity:0;transform:scale(1.14)}to{opacity:1;transform:scale(1)}}
  @keyframes linenOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.05)}}
  @keyframes wedgeIn {from{opacity:0;transform:translateY(30%)}to{opacity:.96;transform:translateY(0)}}

  /* prepared (pre-first-paint) */
  .prep .layer .inner{opacity:0;}
  .prep .bg-dark,.prep .bg-light,.prep .bg-wedge{opacity:0;}
  .prep .title span,.prep .eyebrow span{transform:translateY(115%);}
  .prep .divider{opacity:0;transform:scaleX(0);}
  .prep .desc,.prep .btn{opacity:0;}

  /* backgrounds: left wood slides in, right linen zoom-fades — different transitions */
  .entering .bg-dark {animation:woodIn 1.15s var(--ease) both;}
  .entering .bg-light{animation:linenIn 1.3s .05s var(--ease) both;}
  .entering .bg-wedge{animation:wedgeIn 1.1s .12s var(--ease) both;}
  .leaving  .bg-dark {animation:woodOut .55s var(--ease-in) both;}
  .leaving  .bg-light{animation:linenOut .55s var(--ease-in) both;}

  .entering .l-platter   .inner{animation:platterIn 1.3s var(--ease) both;}
  .entering .l-hummus    .inner{animation:dropIn 1s .18s cubic-bezier(.34,1.42,.64,1) both;}
  .entering .l-tabbouleh .inner{animation:leftIn 1.05s .30s var(--ease) both;}
  .entering .l-pita      .inner{animation:riseIn 1.05s .40s var(--ease) both;}
  .entering .l-chick     .inner{animation:popIn .85s .58s cubic-bezier(.34,1.56,.64,1) both;}
  .entering .eyebrow span{animation:cIn .8s .30s var(--ease) both;}
  .entering .title span{animation:maskUp .95s .40s var(--ease) both;}
  .entering .divider{animation:divIn .8s .55s var(--ease) both;}
  .entering .desc{animation:cIn .85s .62s var(--ease) both;}
  .entering .btn{animation:cIn .85s .72s var(--ease) both;}

  .leaving .l-platter .inner{animation:platterOut .6s var(--ease-in) both;}
  .leaving .l-hummus .inner,.leaving .l-tabbouleh .inner,.leaving .l-pita .inner,.leaving .l-chick .inner{animation:foodOut .5s var(--ease-in) both;}
  .leaving .eyebrow span,.leaving .title span{animation:maskDown .5s var(--ease-in) both;}
  .leaving .desc,.leaving .btn{animation:cOut .45s var(--ease-in) both;}
  .leaving .divider{animation:divIn .4s var(--ease-in) reverse both;}

  .hint{position:absolute;bottom:16px;left:46px;font-size:11px;color:#8a8270;z-index:20;letter-spacing:1px;}
</style>
</head>
<body>
<div class="stage prep" id="stage">
  <div class="bg-light"></div>
  <div class="bg-dark"></div>
  <div class="bg-wedge"></div>

  <header>
    <div class="logo">
      <svg viewBox="0 0 44 52" fill="none">
        <path d="M22 2 L30 16 L26 16 L33 27 L28 27 L36 40 L24 40 L24 50 L20 50 L20 40 L8 40 L16 27 L11 27 L18 16 L14 16 Z" fill="currentColor"/>
      </svg>
      <div><div class="lt">CEDAR FLAME</div><div class="ls">• LEBANESE · KITCHEN •</div></div>
    </div>
    <div class="menu"><span></span><span></span><span></span></div>
  </header>

  <!-- FOOD SCENE -->
  <div class="scene" id="scene">
    <div class="layer l-chick"     data-depth="46"><div class="inner"><div class="art"><img fetchpriority="high" decoding="async" src="./chickpeas.webp" alt=""></div></div></div>
    <div class="layer l-tabbouleh" data-depth="34"><div class="inner"><div class="art"><img loading="lazy" decoding="async" src="./tabbouleh.webp" alt=""></div></div></div>
    <div class="layer l-platter"   data-depth="16"><div class="inner"><div class="art"><img loading="lazy" decoding="async" src="./platter.webp" alt=""></div></div></div>
    <div class="layer l-hummus"    data-depth="40"><div class="inner"><div class="art"><img loading="lazy" decoding="async" src="./hummus.webp" alt=""></div></div></div>
    <div class="layer l-pita"      data-depth="30"><div class="inner"><div class="art"><img loading="lazy" decoding="async" src="./pita.webp" alt=""></div></div></div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="eyebrow"><span id="eyebrow">Authentic Lebanese Kitchen</span></div>
    <h1 class="title"><span id="title">Taste of Lebanon</span></h1>
    <div class="divider">
      <span class="ln"></span>
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 0l2.4 5.1L18 5.9l-4 4 1 5.6L10 13l-5 2.5 1-5.6-4-4 5.6-.8z"/></svg>
      <span class="ln"></span>
    </div>
    <p class="desc">Fresh mezze, grilled favorites, and authentic flavors come together in a refined dining experience inspired by the heart of Lebanese cuisine.</p>
    <a class="btn" id="btn"><span>DISCOVER MORE</span></a>
  </div>

  <!-- NAV -->
  <div class="nav"><button id="prev">PREV</button><button id="next">NEXT</button></div>
  <div class="pager" id="pager"></div>

  <div class="grain"></div>
</div>

<script>
  const $=id=>document.getElementById(id);
  const stage=$('stage'),scene=$('scene'),content=$('content'),pager=$('pager');
  let busy=false;

  // 5 static pager dots (first active) to match the reference design
  for(let k=0;k<5;k++){const d=document.createElement('span');d.className='dot'+(k===0?' on':'');d.innerHTML='<i></i>';pager.appendChild(d);}

  const regions=[stage,scene,content];  // stage included so the backgrounds animate too
  const setC=(c,on)=>regions.forEach(r=>r.classList.toggle(c,on));

  function reveal(){
    setC('leaving',false);setC('entering',true);
    setTimeout(()=>setC('entering',false),1700);
  }
  // single design → PREV / NEXT replay the cinematic reveal
  function replay(dir){
    if(busy)return;busy=true;
    stage.classList.remove('prep');
    stage.style.setProperty('--dir',dir);
    setC('entering',false);setC('leaving',true);
    setTimeout(()=>{void stage.offsetWidth;reveal();busy=false;},600);
  }
  $('next').onclick=()=>replay(1);$('prev').onclick=()=>replay(-1);
  addEventListener('keydown',e=>{if(e.key==='ArrowRight')replay(1);if(e.key==='ArrowLeft')replay(-1);});

  const layers=[...document.querySelectorAll('.layer')];
  let tx=0,ty=0,cx=0,cy=0;
  stage.addEventListener('mousemove',e=>{const r=stage.getBoundingClientRect();
    tx=(e.clientX-r.left)/r.width-.5;ty=(e.clientY-r.top)/r.height-.5;});
  stage.addEventListener('mouseleave',()=>{tx=0;ty=0;});
  (function loop(){
    cx+=(tx-cx)*.07;cy+=(ty-cy)*.07;
    layers.forEach(l=>{const d=+l.dataset.depth;
      l.style.setProperty('--px',(cx*d).toFixed(2)+'px');
      l.style.setProperty('--py',(cy*d).toFixed(2)+'px');});
    content.style.setProperty('--cpx',(cx*-8).toFixed(2)+'px');
    requestAnimationFrame(loop);
  })();

  // cinematic intro on load
  requestAnimationFrame(()=>{stage.classList.remove('prep');reveal();});
</script>
</body>
</html>
